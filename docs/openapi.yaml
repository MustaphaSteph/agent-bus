openapi: 3.1.0

info:
  title: agent-bus
  version: 0.24.0
  summary: Local message bus for agent-to-agent communication via MCP
  description: |
    `agent-bus` exposes 62 tools over an MCP stdio server. This OpenAPI
    document maps the core tool surface to synthetic `POST /tools/<name>`
    endpoints for documentation, validation, and code-generation purposes.
    The real transport is JSON-RPC 2.0 over stdio — there is no HTTP server.

    For the authoritative full MCP surface, including newer manager workflow
    tools, use `docs/tools.md`.

    Every tool takes a JSON object body and returns a JSON object body.
    Errors come back as `{ "error": { "code": "<code>", "message": "<text>" } }`
    with a 4xx status (in this synthetic mapping).

    See the rest of the docs at `docs/` for a friendlier walkthrough.
  contact:
    name: agent-bus
    url: https://github.com/MustaphaSteph/agent-bus
  license:
    name: MIT
    identifier: MIT

servers:
  - url: mcp://agent-bus
    description: MCP stdio server (synthetic URL — not HTTP)

security: []

tags:
  - name: Identity
    description: Claim a name on the bus and discover other agents.
  - name: Direct messaging
    description: One-to-one async messaging, inbox reads, and acknowledgements.
  - name: Request / response
    description: Synchronous blocking question/answer flows.
  - name: Channels
    description: One-to-many pub/sub broadcasting.
  - name: Teams
    description: Scoped workgroup routing inside a project/area.
  - name: Discovery
    description: Read conversation threads and recent bus traffic.
  - name: Tasks
    description: First-class units of work with ownership, state, and stale detection.

paths:
  /tools/register:
    post:
      tags: [Identity]
      summary: Register an agent
      description: |
        Claim a name on the bus, optionally declaring capability tags.
        Idempotent when `replace: true` is set. Without `replace`, fails
        with `NAME_TAKEN` if the name was last seen within 60 seconds.
        MCP sessions default `project` from the repo cwd; CLI relay
        registrations default to `null`.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              minimal:
                value:
                  name: alpha
              with-capabilities:
                value:
                  name: worker-a
                  capabilities: [tests, review]
                  project: agent-bus
              replace:
                value:
                  name: alpha
                  replace: true
      responses:
        '200':
          description: The registered agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/send:
    post:
      tags: [Direct messaging]
      summary: Send a direct message (fire-and-forget)
      description: |
        Insert a `msg` row addressed to one agent. Returns immediately.
        A new `thread_id` is auto-generated unless one is provided.
      operationId: send
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendRequest'
            examples:
              hello:
                value:
                  from: alpha
                  to: beta
                  message: hello beta
              continue-thread:
                value:
                  from: alpha
                  to: beta
                  message: also this
                  thread_id: t_kxxx_abc123
      responses:
        '200':
          description: The inserted message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/send_team:
    post:
      tags: [Teams]
      summary: Send a message to active members of a team
      description: |
        Fans out to active, non-paused, non-stale agents registered with
        the selected team. Team is neutral routing metadata, not a
        behavior policy.
      operationId: send_team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTeamRequest'
      responses:
        '200':
          description: Inserted messages, one per recipient.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/inbox:
    post:
      tags: [Direct messaging]
      summary: Read pending messages
      description: |
        Returns messages addressed to the caller with `status='pending'`.
        Pass `team` to read only messages scoped to that team; omit it
        or pass `*` to read all teams for the agent.

        - Without `wait_s`: returns immediately (may be empty).
        - With `wait_s`: blocks up to that many seconds (max 110) for
          the first message to arrive.
        - Without `claim_s`: returned messages flip to `delivered`
          (at-most-once).
        - With `claim_s`: returned messages stay `pending` with a
          `claim_deadline` set to `now + claim_s*1000`. They become
          invisible to other inbox calls until either you `ack` them
          or the claim expires and they become visible again.
      operationId: inbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxRequest'
            examples:
              snapshot:
                value:
                  agent: alpha
              listener:
                value:
                  agent: alpha
                  wait_s: 110
              at-least-once:
                value:
                  agent: alpha
                  wait_s: 110
                  claim_s: 300
      responses:
        '200':
          description: Messages addressed to the caller (could be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/ack:
    post:
      tags: [Direct messaging]
      summary: Acknowledge a claimed message
      description: |
        Flip a claimed `pending` message to `delivered` and clear its
        claim. Use after successfully processing a message returned by
        `inbox(claim_s=...)`.
      operationId: ack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckRequest'
            examples:
              ack:
                value:
                  agent: alpha
                  message_id: 42
      responses:
        '200':
          description: The updated message (now `delivered`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/inbox_status:
    post:
      tags: [Direct messaging]
      summary: Inspect inbox state without consuming messages
      operationId: inbox_status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxStatusRequest'
      responses:
        '200':
          description: Unread, in-flight, delivered-recent, and summary state.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/inbox_previews:
    post:
      tags: [Direct messaging]
      summary: Preview pending inbox messages without full bodies
      description: |
        Returns pending inbox metadata plus bounded content previews
        without consuming messages. Use before `inbox` when large message
        bodies could truncate the tool result.
      operationId: inbox_previews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxPreviewsRequest'
      responses:
        '200':
          description: Pending message previews.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessagePreview'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/get_message:
    post:
      tags: [Direct messaging]
      summary: Fetch one exact message by id
      description: |
        Fetches one message. Pass `include_content:false` or
        `preview_chars` to return metadata and a bounded preview instead
        of a full potentially huge body. Optional project/area/team
        fields act as safety filters.
      operationId: get_message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMessageRequest'
      responses:
        '200':
          description: Message or preview plus response guidance.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/ask:
    post:
      tags: [Request / response]
      summary: Ask a question and block for the reply
      description: |
        Inserts an `ask` message and polls for a `reply` row pointing back
        at it. Blocks up to `timeout_s` seconds (max 110, default 60).
        Refuses cycles: if the recipient has a pending ask back to the
        caller, fails with `ASK_CYCLE`.
      operationId: ask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
            examples:
              quick:
                value:
                  from: alpha
                  to: beta
                  question: what is 2+2?
              longer-timeout:
                value:
                  from: alpha
                  to: beta
                  question: please review src/api.ts
                  timeout_s: 100
      responses:
        '200':
          description: The reply message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/ask_best:
    post:
      tags: [Request / response]
      summary: Route an ask to the best capability match
      description: |
        Picks the most-recently-active agent that has the given
        capability tag in the selected project/area, then performs
        `ask`. Pass `project: "*"` or `area: "*"` to search more
        broadly. Refuses matches where the candidate hasn't been seen in
        5 minutes.
      operationId: ask_best
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskBestRequest'
            examples:
              react:
                value:
                  from: human
                  capability: react
                  question: how to memoize this list?
                  project: agent-bus
      responses:
        '200':
          description: The reply message from the chosen agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/ask_team:
    post:
      tags: [Teams]
      summary: Ask the best active member of a team
      operationId: ask_team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskTeamRequest'
      responses:
        '200':
          description: The reply from the selected team member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/reply:
    post:
      tags: [Request / response]
      summary: Answer a pending ask
      description: |
        Close an `ask` with an answer. Creates a `reply` row pointing at
        the ask via `reply_to`, inheriting the ask's `thread_id`, and
        flips the original ask's status to `answered`.
      operationId: reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyRequest'
            examples:
              answer:
                value:
                  from: beta
                  ask_id: 42
                  answer: "4"
      responses:
        '200':
          description: The reply message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/reply_thread:
    post:
      tags: [Request / response]
      summary: Continue an existing thread
      operationId: reply_thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyThreadRequest'
      responses:
        '200':
          description: The sent message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/message_status:
    post:
      tags: [Request / response]
      summary: Diagnose one message
      operationId: message_status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageStatusRequest'
      responses:
        '200':
          description: Message delivery/reply diagnostics.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/why_no_reply:
    post:
      tags: [Request / response]
      summary: Explain why a message has no reply yet
      operationId: why_no_reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageStatusRequest'
      responses:
        '200':
          description: Message delivery/reply diagnostics.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/subscribe:
    post:
      tags: [Channels]
      summary: Subscribe an agent to a channel
      description: |
        Idempotent — re-subscribing refreshes `subscribed_at`.
      operationId: subscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelMembership'
            examples:
              join:
                value:
                  agent: carol
                  channel: team-updates
      responses:
        '200':
          description: The subscription record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/unsubscribe:
    post:
      tags: [Channels]
      summary: Unsubscribe an agent from a channel
      description: |
        No-op if the agent isn't subscribed.
      operationId: unsubscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelMembership'
            examples:
              leave:
                value:
                  agent: carol
                  channel: team-updates
      responses:
        '200':
          description: Acknowledgement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/send_channel:
    post:
      tags: [Channels]
      summary: Broadcast a message to every subscriber of a channel
      description: |
        Fans out: inserts one `msg` row per subscriber (sender
        excluded). Each row carries `channel = <name>` and a shared
        `thread_id`.
      operationId: send_channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChannelRequest'
            examples:
              alert:
                value:
                  from: ci
                  channel: alerts
                  message: build failed on main
      responses:
        '200':
          description: One message per recipient (empty if no subscribers).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/subscribers:
    post:
      tags: [Channels]
      summary: List the agents subscribed to a channel
      operationId: subscribers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelOnlyRequest'
            examples:
              list:
                value:
                  channel: team-updates
      responses:
        '200':
          description: The list of agent names.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentName'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/thread:
    post:
      tags: [Discovery]
      summary: Read every message in a conversation thread
      description: |
        Returns every message that shares the given `thread_id`, in
        chronological order. Does not mutate status.
      operationId: thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadRequest'
            examples:
              read:
                value:
                  thread_id: t_kxxx_abc123
              limited:
                value:
                  thread_id: t_kxxx_abc123
                  limit: 50
      responses:
        '200':
          description: The thread's messages in order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/whois:
    post:
      tags: [Identity]
      summary: List every registered agent
      description: |
        Returns every row in the `agents` table sorted by `last_seen`
        descending.
      operationId: whois
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  $ref: '#/components/schemas/ProjectFilter'
                area:
                  $ref: '#/components/schemas/AreaFilter'
              additionalProperties: false
            examples:
              scoped:
                value:
                  project: agent-bus
                  area: area-a
              global:
                value:
                  project: "*"
                  area: "*"
      responses:
        '200':
          description: The list of agents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/recent:
    post:
      tags: [Discovery]
      summary: Read recent messages regardless of recipient
      description: |
        Useful for catching up on the bus. Does not mutate status.
        Project and area filters return matching messages plus legacy/global
        `null` scope messages. Pass `"*"` for global on a dimension.
      operationId: recent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecentRequest'
            examples:
              last-50:
                value: {}
              last-200:
                value:
                  limit: 200
      responses:
        '200':
          description: The most recent messages (ascending order).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/create_task:
    post:
      tags: [Tasks]
      summary: Create a task
      description: |
        Creates a first-class unit of work in `open` state. Tasks are
        queryable work items; messages and threads carry the discussion
        around that work. A `thread_id` is generated unless provided.
        Project defaults to the requester agent's project.
      operationId: create_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              review:
                value:
                  requested_by: orchestrator
                  title: Verify current diff
                  description: Run tests and report findings.
                  priority: 10
                  cwd: /Users/air/Documents/Projects/agent-bus
                  project: agent-bus
      responses:
        '200':
          description: The created task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/delegate:
    post:
      tags: [Tasks]
      summary: Create, assign, notify, and require acknowledgement for long work
      operationId: delegate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegateRequest'
      responses:
        '200':
          description: Delegation result.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/delegate_team:
    post:
      tags: [Tasks]
      summary: Create board-visible tracked tasks for active team members
      description: |
        Use this instead of `send_team` when team work should appear on
        `team_board`, `kanban`, or `done`. It creates one delegated task
        per active matching team member and reports skipped recipients.
      operationId: delegate_team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegateTeamRequest'
      responses:
        '200':
          description: Team delegation result.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/claim_task:
    post:
      tags: [Tasks]
      summary: Atomically claim an open task
      description: |
        Moves an `open` task to `claimed` and sets `claimed_by`. The
        update is atomic and only succeeds when the task is still open
        and unclaimed.
      operationId: claim_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimTaskRequest'
            examples:
              claim:
                value:
                  agent: verifier
                  task_id: 42
      responses:
        '200':
          description: The claimed task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/update_task:
    post:
      tags: [Tasks]
      summary: Update task state or metadata
      description: |
        Updates a task while enforcing the state machine:
        `open -> claimed|canceled`, `claimed -> working|open|canceled|failed`,
        `working -> blocked|completed|failed|canceled`, and
        `blocked -> working|completed|failed|canceled`. Terminal states
        cannot transition. Only the requester or current holder can update.
      operationId: update_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
            examples:
              working:
                value:
                  agent: verifier
                  task_id: 42
                  state: working
              blocked:
                value:
                  agent: verifier
                  task_id: 42
                  state: blocked
                  blocked_reason: Waiting for CI logs.
              completed:
                value:
                  agent: verifier
                  task_id: 42
                  state: completed
                  result: No findings.
      responses:
        '200':
          description: The updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/release_task:
    post:
      tags: [Tasks]
      summary: Release a held task back to open
      description: |
        Clears `claimed_by` and moves a non-terminal task back to `open`
        so another agent can claim it. The requester or current holder
        can release.
      operationId: release_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseTaskRequest'
            examples:
              release:
                value:
                  agent: verifier
                  task_id: 42
      responses:
        '200':
          description: The released task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/list_tasks:
    post:
      tags: [Tasks]
      summary: List tasks
      description: |
        Returns tasks sorted by priority descending, then creation order.
        Terminal tasks are excluded by default unless `include_terminal`
        is true or a terminal `state` filter is provided. Active tasks
        may include `stale: true` when their holder has not heartbeated
        within `AGENT_BUS_TASK_STALE_MS`. Concrete `project` and `area`
        filters hide null-scope legacy tasks; `project: "*"` and
        `area: "*"` broaden the view.
      operationId: list_tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListTasksRequest'
            examples:
              active:
                value: {}
              working:
                value:
                  state: working
                  project: agent-bus
              by-agent:
                value:
                  claimed_by: verifier
      responses:
        '200':
          description: Matching tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/get_task:
    post:
      tags: [Tasks]
      summary: Fetch one task
      operationId: get_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTaskRequest'
            examples:
              one:
                value:
                  task_id: 42
      responses:
        '200':
          description: The task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/record_task_event:
    post:
      tags: [Tasks]
      summary: Record a task event or progress note
      description: |
        Appends durable task progress. A non-null `phase` also updates
        `tasks.phase`, so managers can distinguish silent asks from
        active work.
      operationId: record_task_event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordTaskEventRequest'
      responses:
        '200':
          description: The recorded task event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEvent'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/list_task_events:
    post:
      tags: [Tasks]
      summary: List task event rows
      operationId: list_task_events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListTaskEventsRequest'
      responses:
        '200':
          description: Matching task events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskEvent'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/task_result:
    post:
      tags: [Tasks]
      summary: Fetch a task result bundle
      description: Returns one task with its events, test evidence, memories, and thread messages.
      operationId: task_result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskResultRequest'
      responses:
        '200':
          description: Task result bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResult'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/wait_for_task:
    post:
      tags: [Tasks]
      summary: Wait for task activity
      operationId: wait_for_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WaitForTaskRequest'
      responses:
        '200':
          description: Task result plus latest activity and timeout flag.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/cancel_task:
    post:
      tags: [Tasks]
      summary: Cancel a non-terminal task
      description: Marks the task canceled, records a cancel event, notifies the other side, and runs local hooks.
      operationId: cancel_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelTaskRequest'
      responses:
        '200':
          description: Canceled task and cancel event.
          content:
            application/json:
              schema:
                type: object
                required: [task, event]
                properties:
                  task:
                    $ref: '#/components/schemas/Task'
                  event:
                    $ref: '#/components/schemas/TaskEvent'
        '400':
          $ref: '#/components/responses/BusError'

  /tools/review_gate:
    post:
      tags: [Reports]
      summary: Check merge/push readiness
      description: Combines project-board blockers with final-report safety flags.
      operationId: review_gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScopeRequest'
      responses:
        '200':
          description: Review gate report.
          content:
            application/json:
              schema:
                type: object
                required: [ok, blockers, warnings, final_report, board]
                properties:
                  ok:
                    type: boolean
                  blockers:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  final_report:
                    type: object
                  board:
                    type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/activity:
    post:
      tags: [Discovery, Tasks]
      summary: Read a chronological activity timeline
      description: Combines recent messages, task events, test results, decisions, and memories.
      operationId: activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityRequest'
      responses:
        '200':
          description: Activity rows in chronological order.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/cockpit:
    post:
      tags: [Tasks]
      summary: Coordinator next-action dashboard
      operationId: cockpit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CockpitRequest'
      responses:
        '200':
          description: Waiting items, ready items, blockers, suggestions, and board state.
          content:
            application/json:
              schema:
                type: object
                required: [waiting_on, ready, blockers, suggested_next_actions, board]
                properties:
                  waiting_on:
                    type: array
                    items:
                      type: string
                  ready:
                    type: array
                    items:
                      type: string
                  blockers:
                    type: array
                    items:
                      type: string
                  suggested_next_actions:
                    type: array
                    items:
                      type: string
                  board:
                    type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/now:
    post:
      tags: [Tasks, Identity]
      summary: Update an agent's current visible work
      operationId: now
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NowRequest'
      responses:
        '200':
          description: Updated agent, optional task/event, and suggested next actions.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

  /tools/team_board:
    post:
      tags: [Teams, Tasks]
      summary: Manager board scoped to one team
      operationId: team_board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamBoardRequest'
      responses:
        '200':
          description: Same shape as project_board, filtered to the selected team.
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BusError'

components:
  schemas:
    AgentName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9_.-]+$'
      description: Agent identifier on the bus.
      example: alpha

    ChannelName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9_.:#-]+$'
      description: Channel name. Slightly looser pattern than agent names — allows `:` and `#`.
      example: team-updates

    ThreadId:
      type: string
      minLength: 1
      description: Conversation thread identifier. Auto-generated unless provided.
      example: t_kxxx_abc123

    ProjectName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9_.-]+$'
      description: Project scope derived from repo cwd or supplied explicitly.
      example: agent-bus

    ProjectFilter:
      oneOf:
        - $ref: '#/components/schemas/ProjectName'
        - type: string
          enum: ['*']
          description: Wildcard meaning all projects.

    AreaName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9_.-]+$'
      description: Area scope derived from `.agent-bus.json` or supplied explicitly.
      example: area-a

    AreaFilter:
      oneOf:
        - $ref: '#/components/schemas/AreaName'
        - type: string
          enum: ['*']
          description: Wildcard meaning all areas.

    TeamName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9_.-]+$'
      description: Optional workgroup scope inside a project/area.
      example: ios-ui

    TeamFilter:
      oneOf:
        - $ref: '#/components/schemas/TeamName'
        - type: string
          enum: ['*']
          description: Wildcard meaning all teams.

    MessageKind:
      type: string
      enum: [msg, ask, reply]
      description: |
        - `msg`: fire-and-forget direct message or channel broadcast.
        - `ask`: synchronous question expecting a `reply`.
        - `reply`: answer to a specific `ask`.

    MessageStatus:
      type: string
      enum: [pending, delivered, answered]
      description: |
        - `pending`: not yet read by the recipient.
        - `delivered`: inbox returned this row (or it was acked).
        - `answered`: only for `ask` — set when `reply()` closed the ask.

    TaskState:
      type: string
      enum: [open, claimed, working, blocked, completed, failed, canceled]
      description: |
        `open` tasks can be claimed. `claimed`, `working`, and `blocked`
        are active holder states. `completed`, `failed`, and `canceled`
        are terminal.

    Agent:
      type: object
      required: [name, capabilities, registered_at, last_seen, paused, project, area, team]
      properties:
        name:
          $ref: '#/components/schemas/AgentName'
        capabilities:
          type: array
          items: { type: string }
          description: Capability tags used by `ask_best` routing.
        registered_at:
          type: integer
          format: int64
          description: First-registered timestamp (ms since epoch).
        last_seen:
          type: integer
          format: int64
          description: Most recent heartbeat (ms since epoch).
        paused:
          type: boolean
          description: When true, inbox returns empty while messages keep queuing.
        project:
          type: [string, 'null']
          description: Project associated with this globally unique agent name. Null means legacy/global.
        area:
          type: [string, 'null']
          description: Area associated with this agent. Null means no area/legacy.
        team:
          type: [string, 'null']
          description: Optional workgroup associated with this agent.
        role:
          type: [string, 'null']
          description: Optional routing role.
        routing_weight:
          type: integer
          description: Higher values are preferred by ask_best.
        status:
          type: string
          enum: [idle, working, blocked, waiting_review, sleeping]
        session_id:
          type: [string, 'null']
          description: Optional host/model session id.

    Message:
      type: object
      required:
        - id
        - from_agent
        - to_agent
        - kind
        - content
        - status
        - created_at
        - thread_id
        - project
        - area
        - team
      properties:
        id:
          type: integer
          format: int64
        from_agent:
          $ref: '#/components/schemas/AgentName'
        to_agent:
          $ref: '#/components/schemas/AgentName'
        kind:
          $ref: '#/components/schemas/MessageKind'
        content:
          type: string
          description: Message body. No bus-side size cap.
        reply_to:
          type: [integer, 'null']
          format: int64
          description: For `reply` messages, the id of the `ask` they answer.
        status:
          $ref: '#/components/schemas/MessageStatus'
        created_at:
          type: integer
          format: int64
        delivered_at:
          type: [integer, 'null']
          format: int64
        replied_at:
          type: [integer, 'null']
          format: int64
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        claim_deadline:
          type: [integer, 'null']
          format: int64
          description: At-least-once claim expiry (ms since epoch). Null when not claimed.
        claimed_by:
          type: [string, 'null']
          description: The agent currently holding the claim.
        channel:
          type: [string, 'null']
          description: Set when the message arrived via `send_channel`.
        project:
          type: [string, 'null']
          description: Message project scope. Direct messages copy sender scope; team-routed messages use recipient scope.
        area:
          type: [string, 'null']
          description: Message area scope. Null means no area/legacy.
        team:
          type: [string, 'null']
          description: Message team scope, if any.
        priority:
          type: string
          enum: [low, normal, high, urgent]

    MessagePreview:
      type: object
      required:
        - id
        - from_agent
        - to_agent
        - kind
        - content_preview
        - content_length
        - truncated
        - status
        - created_at
        - thread_id
      properties:
        id:
          type: integer
          format: int64
        from_agent:
          $ref: '#/components/schemas/AgentName'
        to_agent:
          $ref: '#/components/schemas/AgentName'
        kind:
          $ref: '#/components/schemas/MessageKind'
        content_preview:
          type: string
        content_length:
          type: integer
        truncated:
          type: boolean
        reply_to:
          type: [integer, 'null']
          format: int64
        status:
          $ref: '#/components/schemas/MessageStatus'
        created_at:
          type: integer
          format: int64
        delivered_at:
          type: [integer, 'null']
          format: int64
        replied_at:
          type: [integer, 'null']
          format: int64
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        claim_deadline:
          type: [integer, 'null']
          format: int64
        claimed_by:
          type: [string, 'null']
        channel:
          type: [string, 'null']
        project:
          type: [string, 'null']
        area:
          type: [string, 'null']
        team:
          type: [string, 'null']
        priority:
          type: string
          enum: [low, normal, high, urgent]

    Task:
      type: object
      required:
        - id
        - title
        - thread_id
        - requested_by
        - state
        - priority
        - created_at
        - updated_at
        - project
        - area
        - team
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: [string, 'null']
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        requested_by:
          $ref: '#/components/schemas/AgentName'
        claimed_by:
          type: [string, 'null']
          description: Agent currently holding the task, if any.
        state:
          $ref: '#/components/schemas/TaskState'
        priority:
          type: integer
          description: Higher values sort first.
        cwd:
          type: [string, 'null']
          description: Working directory the task targets.
        blocked_reason:
          type: [string, 'null']
        blocked_on_task_id:
          type: [integer, 'null']
          format: int64
          description: Optional soft dependency. No automatic unblock behavior.
        result:
          type: [string, 'null']
          description: Final output or summary on completed/failed tasks.
        created_at:
          type: integer
          format: int64
        updated_at:
          type: integer
          format: int64
        claimed_at:
          type: [integer, 'null']
          format: int64
        finished_at:
          type: [integer, 'null']
          format: int64
          description: Set when the task enters a terminal state.
        stale:
          type: boolean
          description: True when an active holder has not heartbeated within the stale threshold.
        project:
          type: [string, 'null']
          description: Project scope for this task. Null tasks only appear in global task listings.
        area:
          type: [string, 'null']
          description: Area scope for this task. Null-area tasks only appear in global area task listings.
        team:
          type: [string, 'null']
          description: Optional workgroup scope for this task.
        required_capability:
          type: [string, 'null']
          description: Capability required to claim this task.
        phase:
          type: [string, 'null']
          description: Fine-grained progress phase.
        session_id:
          type: [string, 'null']
          description: Optional host/model session id associated with this task.

    Subscription:
      type: object
      required: [channel, agent, subscribed_at]
      properties:
        channel:
          $ref: '#/components/schemas/ChannelName'
        agent:
          $ref: '#/components/schemas/AgentName'
        subscribed_at:
          type: integer
          format: int64

    BusError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - INVALID_INPUT
                - UNKNOWN_AGENT
                - NAME_TAKEN
                - ASK_TIMEOUT
                - ASK_CYCLE
                - ASK_NOT_FOUND
                - MESSAGE_NOT_FOUND
                - THREAD_NOT_FOUND
                - TASK_NOT_FOUND
                - TASK_INVALID_TRANSITION
                - TASK_NOT_CLAIMABLE
                - TASK_FORBIDDEN
                - TASK_SCOPE_CONFLICT
                - TASK_REVIEW_REQUIRED
                - INTERNAL
            message:
              type: string

    Ok:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    RegisterRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          $ref: '#/components/schemas/AgentName'
        capabilities:
          type: array
          items: { type: string }
          maxItems: 32
        replace:
          type: boolean
          description: Take over the name even if another session holds it.
        project:
          type: [string, 'null']
          description: Optional project association. MCP sessions default this from cwd; null is global/legacy.
        area:
          type: [string, 'null']
          description: Optional area association. MCP sessions default this from `.agent-bus.json`; null is no area.
        team:
          type: [string, 'null']
          description: Optional workgroup association.
        role:
          type: [string, 'null']
        routing_weight:
          type: integer

    SendRequest:
      type: object
      required: [from, to, message]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        to:
          $ref: '#/components/schemas/AgentName'
        message:
          type: string
        thread_id:
          $ref: '#/components/schemas/ThreadId'

    SendTeamRequest:
      type: object
      required: [from, message]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        team:
          $ref: '#/components/schemas/TeamFilter'
        message:
          type: string
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        include_self:
          type: boolean

    InboxRequest:
      type: object
      required: [agent]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        team:
          $ref: '#/components/schemas/TeamFilter'
          description: Optional team filter. Concrete team reads only that team's messages; `*` means all teams.
        wait_s:
          type: integer
          minimum: 1
          maximum: 110
          description: Block up to N seconds for the first message to arrive.
        claim_s:
          type: integer
          minimum: 1
          maximum: 3600
          description: At-least-once claim window. Requires `ack` to finalize each returned message.
        since_id:
          type: integer
          minimum: 0
          description: Only return messages with id > this.
        mark_delivered:
          type: boolean
          description: Default true. Ignored when `claim_s` is set.
        limit:
          type: integer
          minimum: 1
          maximum: 500

    InboxStatusRequest:
      type: object
      required: [agent]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        team:
          $ref: '#/components/schemas/TeamFilter'
          description: Optional team filter. Concrete team inspects only that team's rows; `*` means all teams.
        limit:
          type: integer
          minimum: 1
          maximum: 100

    InboxPreviewsRequest:
      type: object
      required: [agent]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        team:
          $ref: '#/components/schemas/TeamFilter'
        since_id:
          type: integer
          minimum: 0
        wait_s:
          type: integer
          minimum: 1
          maximum: 110
        limit:
          type: integer
          minimum: 1
          maximum: 100
        preview_chars:
          type: integer
          minimum: 0
          maximum: 4000

    GetMessageRequest:
      type: object
      required: [message_id]
      additionalProperties: false
      properties:
        message_id:
          type: integer
          format: int64
        include_content:
          type: boolean
        preview_chars:
          type: integer
          minimum: 0
          maximum: 4000
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'

    AckRequest:
      type: object
      required: [agent, message_id]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        message_id:
          type: integer
          format: int64

    AskRequest:
      type: object
      required: [from, to, question]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        to:
          $ref: '#/components/schemas/AgentName'
        question:
          type: string
        timeout_s:
          type: integer
          minimum: 1
          maximum: 110
          default: 60
        thread_id:
          $ref: '#/components/schemas/ThreadId'

    AskBestRequest:
      type: object
      required: [from, capability, question]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        capability:
          type: string
          minLength: 1
        question:
          type: string
        timeout_s:
          type: integer
          minimum: 1
          maximum: 110
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'
        role:
          type: string

    AskTeamRequest:
      type: object
      required: [from, question]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        team:
          $ref: '#/components/schemas/TeamFilter'
        question:
          type: string
        timeout_s:
          type: integer
          minimum: 1
          maximum: 110
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        capability:
          type: string
        role:
          type: string

    ReplyRequest:
      type: object
      required: [from, ask_id, answer]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        ask_id:
          type: integer
          format: int64
        answer:
          type: string

    ReplyThreadRequest:
      type: object
      required: [from, thread_id, message]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        message:
          type: string

    MessageStatusRequest:
      type: object
      required: [message_id]
      additionalProperties: false
      properties:
        message_id:
          type: integer
          format: int64

    ChannelMembership:
      type: object
      required: [agent, channel]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        channel:
          $ref: '#/components/schemas/ChannelName'

    ChannelOnlyRequest:
      type: object
      required: [channel]
      additionalProperties: false
      properties:
        channel:
          $ref: '#/components/schemas/ChannelName'

    SendChannelRequest:
      type: object
      required: [from, channel, message]
      additionalProperties: false
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        channel:
          $ref: '#/components/schemas/ChannelName'
        message:
          type: string
        thread_id:
          $ref: '#/components/schemas/ThreadId'

    ThreadRequest:
      type: object
      required: [thread_id]
      additionalProperties: false
      properties:
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        limit:
          type: integer
          minimum: 1
          maximum: 1000

    RecentRequest:
      type: object
      additionalProperties: false
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'

    CreateTaskRequest:
      type: object
      required: [requested_by, title]
      additionalProperties: false
      properties:
        requested_by:
          $ref: '#/components/schemas/AgentName'
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        priority:
          type: integer
          default: 0
        cwd:
          type: string
        blocked_on_task_id:
          type: integer
          format: int64
        project:
          type: [string, 'null']
          description: Optional project. Defaults to the requester agent's project.
        area:
          type: [string, 'null']
          description: Optional area. Defaults to the requester agent's area.
        team:
          type: [string, 'null']
          description: Optional team. Defaults to the requester agent's team.
        required_capability:
          type: [string, 'null']
          description: Optional capability required to claim this task.
        phase:
          type: [string, 'null']
        session_id:
          type: [string, 'null']

    DelegateRequest:
      type: object
      required: [from, to_agent, title]
      additionalProperties: true
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        to_agent:
          $ref: '#/components/schemas/AgentName'
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        mode:
          type: string
          enum: [investigate_only, propose_patch, edit_files, test_only]
        expected_output:
          type: [string, 'null']
        edit_scope:
          type: array
          items: { type: string }
        read_scope:
          type: array
          items: { type: string }
        file_scope:
          type: array
          items: { type: string }
        allow_pending_agent:
          type: boolean
        allow_conflicts:
          type: boolean

    DelegateTeamRequest:
      type: object
      required: [from, title]
      additionalProperties: true
      properties:
        from:
          $ref: '#/components/schemas/AgentName'
        team:
          type: string
          description: Team to delegate to. Defaults to sender team.
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        mode:
          type: string
          enum: [investigate_only, propose_patch, edit_files, test_only]
        expected_output:
          type: [string, 'null']
        capability:
          type: string
          description: Optional recipient capability filter.
        role:
          type: string
          description: Optional recipient role filter.
        max_recipients:
          type: integer
          minimum: 1
        include_self:
          type: boolean
        edit_scope:
          type: array
          items: { type: string }
        read_scope:
          type: array
          items: { type: string }
        file_scope:
          type: array
          items: { type: string }
        allow_conflicts:
          type: boolean

    ClaimTaskRequest:
      type: object
      required: [agent, task_id]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64

    UpdateTaskRequest:
      type: object
      required: [agent, task_id]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64
        state:
          $ref: '#/components/schemas/TaskState'
        blocked_reason:
          type: [string, 'null']
        blocked_on_task_id:
          type: [integer, 'null']
          format: int64
        result:
          type: [string, 'null']
        priority:
          type: integer
        phase:
          type: [string, 'null']
        session_id:
          type: [string, 'null']

    ReleaseTaskRequest:
      type: object
      required: [agent, task_id]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64

    ListTasksRequest:
      type: object
      additionalProperties: false
      properties:
        state:
          oneOf:
            - $ref: '#/components/schemas/TaskState'
            - type: array
              items:
                $ref: '#/components/schemas/TaskState'
        claimed_by:
          $ref: '#/components/schemas/AgentName'
        requested_by:
          $ref: '#/components/schemas/AgentName'
        thread_id:
          $ref: '#/components/schemas/ThreadId'
        include_terminal:
          type: boolean
          default: false
        limit:
          type: integer
          minimum: 1
          maximum: 500
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'
        required_capability:
          type: string

    GetTaskRequest:
      type: object
      required: [task_id]
      additionalProperties: false
      properties:
        task_id:
          type: integer
          format: int64

    TaskEventType:
      type: string
      enum: [note, phase, progress, log, result, cancel]

    TaskEvent:
      type: object
      required: [id, task_id, by_agent, event_type, message, metadata, created_at]
      properties:
        id:
          type: integer
          format: int64
        task_id:
          type: integer
          format: int64
        by_agent:
          $ref: '#/components/schemas/AgentName'
        event_type:
          $ref: '#/components/schemas/TaskEventType'
        message:
          type: string
        phase:
          type: [string, 'null']
        metadata:
          type: object
          additionalProperties: true
        project:
          type: [string, 'null']
        area:
          type: [string, 'null']
        team:
          type: [string, 'null']
        created_at:
          type: integer
          format: int64

    RecordTaskEventRequest:
      type: object
      required: [by_agent, task_id, message]
      additionalProperties: false
      properties:
        by_agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64
        event_type:
          $ref: '#/components/schemas/TaskEventType'
        message:
          type: string
        phase:
          type: [string, 'null']
        metadata:
          type: object
          additionalProperties: true

    ListTaskEventsRequest:
      type: object
      additionalProperties: false
      properties:
        task_id:
          type: integer
          format: int64
        by_agent:
          $ref: '#/components/schemas/AgentName'
        event_type:
          $ref: '#/components/schemas/TaskEventType'
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'
        limit:
          type: integer
          minimum: 1
          maximum: 500

    TaskResultRequest:
      type: object
      required: [task_id]
      additionalProperties: false
      properties:
        task_id:
          type: integer
          format: int64
        limit:
          type: integer
          minimum: 1
          maximum: 500

    WaitForTaskRequest:
      type: object
      required: [task_id]
      additionalProperties: false
      properties:
        task_id:
          type: integer
          format: int64
        wait_s:
          type: integer
          minimum: 0
          maximum: 110
        since_updated_at:
          type: integer
          format: int64
        limit:
          type: integer
          minimum: 1
          maximum: 500

    TaskResult:
      type: object
      required: [task, events, test_results, memories, messages]
      properties:
        task:
          $ref: '#/components/schemas/Task'
        events:
          type: array
          items:
            $ref: '#/components/schemas/TaskEvent'
        test_results:
          type: array
          items:
            type: object
        memories:
          type: array
          items:
            type: object
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    CancelTaskRequest:
      type: object
      required: [agent, task_id]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64
        reason:
          type: [string, 'null']

    ScopeRequest:
      type: object
      additionalProperties: false
      properties:
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'

    ActivityRequest:
      type: object
      additionalProperties: false
      properties:
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'
        since:
          type: integer
          format: int64
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 200

    CockpitRequest:
      type: object
      additionalProperties: false
      properties:
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        team:
          $ref: '#/components/schemas/TeamFilter'
        agent:
          $ref: '#/components/schemas/AgentName'
        limit:
          type: integer
          minimum: 1
          maximum: 100

    NowRequest:
      type: object
      required: [agent]
      additionalProperties: false
      properties:
        agent:
          $ref: '#/components/schemas/AgentName'
        task_id:
          type: integer
          format: int64
        phase:
          type: [string, 'null']
        note:
          type: [string, 'null']
        status:
          type: string
          enum: [idle, working, blocked, waiting_review, sleeping]

    TeamBoardRequest:
      type: object
      required: [team]
      additionalProperties: false
      properties:
        team:
          $ref: '#/components/schemas/TeamFilter'
        project:
          $ref: '#/components/schemas/ProjectFilter'
        area:
          $ref: '#/components/schemas/AreaFilter'
        limit:
          type: integer
          minimum: 1
          maximum: 500

  responses:
    BusError:
      description: A validation, lookup, or flow error from the bus.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BusError'
          examples:
            unknown-agent:
              value:
                error:
                  code: UNKNOWN_AGENT
                  message: "agent 'ghost' is not registered"
            ask-timeout:
              value:
                error:
                  code: ASK_TIMEOUT
                  message: "no reply from 'beta' within 60s (ask_id=42)"
            ask-cycle:
              value:
                error:
                  code: ASK_CYCLE
                  message: "'beta' already has a pending ask to 'alpha'; would deadlock"
            name-taken:
              value:
                error:
                  code: NAME_TAKEN
                  message: "agent 'alpha' is active (last seen 12s ago); pass replace:true to take over"
